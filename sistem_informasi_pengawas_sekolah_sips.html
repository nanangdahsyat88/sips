  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    /* Sembunyikan elemen tertentu saat mencetak laporan */
    @media print {
      .no-print {
        display: none !important;
      }
      .print-area {
        width: 100% !important;
        margin: 0 !important;
        padding: 0 !important;
      }
      table {
        page-break-inside: auto;
      }
      tr {
        page-break-inside: avoid;
        page-break-after: auto;
      }
    }
    /* Efek scroll yang mulus */
    .custom-scrollbar::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }
    .custom-scrollbar::-webkit-scrollbar-track {
      background: #f1f5f9;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #cbd5e1;
      border-radius: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb:hover {
      background: #94a3b8;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased min-h-screen flex flex-col">

  <!-- Area Root Tempat Aplikasi React Dimuat -->
  <div id="root" class="flex-1 flex flex-col"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    // --- DATA DEFAULT (MOCK DATA) SEBAGAI TEMPLATE AWAL ---
    const defaultSdSchools = [
      { 
        id: "sd-1", 
        nama: "SD Negeri 1 Palembang", 
        status: "NEGERI", 
        alamat: "Jl. Merdeka No. 10, Palembang", 
        akreditasi: "A", 
        npsn: "10234567", 
        kepsek: "Hj. Sumarni, S.Pd.", 
        hpKepsek: "08127345678",

        murid: { L1: 25, P1: 22, L2: 24, P2: 26, L3: 21, P3: 25, L4: 28, P4: 20, L5: 22, P5: 23, L6: 29, P6: 21 }, 
        rombel: [1, 1, 1, 1, 1, 1], 
        guru: { pns: 8, nonAsn: 3, yayasan: 0, tendik: 2, kepsek: 1 } 
      },
      { 
        id: "sd-2", 
        nama: "SD Swasta IT Al-Azhar", 
        status: "SWASTA", 
        alamat: "Jl. Jenderal Sudirman No. 102, Palembang", 
        akreditasi: "A", 
        npsn: "10987654", 
        kepsek: "H. Ahmad Fauzi, S.Th.I", 
        hpKepsek: "08119876543", 
        email: "info@alazhar-plg.sch.id", 
        murid: { L1: 45, P1: 48, L2: 42, P2: 44, L3: 40, P3: 45, L4: 48, P4: 40, L5: 42, P5: 43, L6: 49, P6: 41 }, 
        rombel: [2, 2, 2, 2, 2, 2], 
        guru: { pns: 0, nonAsn: 2, yayasan: 15, tendik: 4, kepsek: 1 } 
      }
    ];

    const defaultSmpSchools = [
      { 
        id: "smp-1", 
        nama: "SMP Negeri 1 Palembang", 
        status: "NEGERI", 
        alamat: "Jl. Mayor Ruslan No. 5, Palembang", 
        akreditasi: "A", 
        npsn: "30104561", 
        kepsek: "Drs. H. M. Yusuf, M.Si.", 
        hpKepsek: "08136271923", 
        email: "smpn1plg@sch.id", 
        murid: { L7: 95, P7: 102, L8: 98, P8: 96, L9: 105, P9: 99 }, 
        rombel: [3, 3, 3], 
        guru: { pns: 18, nonAsn: 5, yayasan: 0, tendik: 3, kepsek: 1 } 
      }
    ];

    const defaultVisits = [
      { id: "v-1", namaSekolah: "SD Negeri 1 Palembang", jenjang: "SD", status: "NEGERI", checklist: [true, true, false, false, true, false, false, false, true, false, true, false] },
      { id: "v-2", namaSekolah: "SD Swasta IT Al-Azhar", jenjang: "SD", status: "SWASTA", checklist: [true, false, true, false, true, false, true, false, true, false, true, false] },
      { id: "v-3", namaSekolah: "SMP Negeri 1 Palembang", jenjang: "SMP", status: "NEGERI", checklist: [true, true, true, true, false, true, false, false, true, true, false, true] }
    ];

    const defaultPkks = [
      { id: "p-1", sekolah: "SD Negeri 1 Palembang", indikator: "Aktif", observasi: "A", keterangan: "Sangat baik dalam manajemen pengelolaan administrasi sekolah." },
      { id: "p-2", sekolah: "SMP Negeri 1 Palembang", indikator: "Aktif", observasi: "A", keterangan: "Implementasi Kurikulum Merdeka terlaksana secara menyeluruh." }
    ];

    const defaultReflections = [
      { id: "r-1", namaSekolah: "SD Negeri 1 Palembang", pertemuan: 1, tanggal: "2026-01-15", deskripsi: "Refleksi awal peningkatan literasi dasar pada murid kelas rendah.", status: "Aktif" },
      { id: "r-2", namaSekolah: "SMP Negeri 1 Palembang", pertemuan: 2, tanggal: "2026-03-22", deskripsi: "Evaluasi kesiapan sarana Asesmen Nasional Berbasis Komputer (ANBK).", status: "Aktif" }
    ];

    function App() {
      // Pilihan Menu Utama
      const [currentTab, setCurrentTab] = useState("dashboard");
      // Pilihan Sub-Tab Data SD & Data SMP (sekolah, murid, rombel, guru)
      const [sdTab, setSdTab] = useState("sekolah");
      const [smpTab, setSmpTab] = useState("sekolah");

      // Load data awal dari Local Storage atau gunakan template bawaan
      const [sdSchools, setSdSchools] = useState(() => {
        const stored = localStorage.getItem("sips_sd_schools");
        return stored ? JSON.parse(stored) : defaultSdSchools;
      });

      const [smpSchools, setSmpSchools] = useState(() => {
        const stored = localStorage.getItem("sips_smp_schools");
        return stored ? JSON.parse(stored) : defaultSmpSchools;
      });

      const [visits, setVisits] = useState(() => {
        const stored = localStorage.getItem("sips_visits");
        return stored ? JSON.parse(stored) : defaultVisits;
      });

      const [pkks, setPkks] = useState(() => {
        const stored = localStorage.getItem("sips_pkks");
        return stored ? JSON.parse(stored) : defaultPkks;
      });

      const [reflections, setReflections] = useState(() => {
        const stored = localStorage.getItem("sips_reflections");
        return stored ? JSON.parse(stored) : defaultReflections;
      });

      // Sinkronisasi data ke Local Storage setiap kali terjadi perubahan
      useEffect(() => {
        localStorage.setItem("sips_sd_schools", JSON.stringify(sdSchools));
      }, [sdSchools]);

      useEffect(() => {
        localStorage.setItem("sips_smp_schools", JSON.stringify(smpSchools));
      }, [smpSchools]);

      useEffect(() => {
        localStorage.setItem("sips_visits", JSON.stringify(visits));
      }, [visits]);

      useEffect(() => {
        localStorage.setItem("sips_pkks", JSON.stringify(pkks));
      }, [pkks]);

      useEffect(() => {
        localStorage.setItem("sips_reflections", JSON.stringify(reflections));
      }, [reflections]);

      // State Pencarian global / Filter Sekolah
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedSchoolFilter, setSelectedSchoolFilter] = useState("");

      // State Pengaturan Modal Form
      const [isModalOpen, setIsModalOpen] = useState(false);
      const [modalType, setModalType] = useState(""); // "sd_sekolah", "smp_sekolah", "pkks", "refleksi"
      const [editData, setEditData] = useState(null);
      const [formData, setFormData] = useState({});

      // State Notifikasi Kostum (untuk menggantikan alert)
      const [notification, setNotification] = useState(null);

      const showNotification = (message, type = "success") => {
        setNotification({ message, type });
        setTimeout(() => setNotification(null), 3000);
      };

      // Reset pencarian dan filter
      const handleResetSearch = () => {
        setSearchQuery("");
        setSelectedSchoolFilter("");
      };

      // Membuka modal form dalam kondisi Tambah maupun Edit
      const handleOpenModal = (type, data = null) => {
        setModalType(type);
        setEditData(data);
        if (data) {
          setFormData({ ...data });
        } else {
          // Inisialisasi formulir baru kosong
          if (type === "sd_sekolah" || type === "smp_sekolah") {
            setFormData({
              nama: "",
              status: "NEGERI",
              alamat: "",
              akreditasi: "A",
              npsn: "",
              kepsek: "",
              hpKepsek: "",
              email: "",
              murid: type === "sd_sekolah" 
                ? { L1: 0, P1: 0, L2: 0, P2: 0, L3: 0, P3: 0, L4: 0, P4: 0, L5: 0, P5: 0, L6: 0, P6: 0 }
                : { L7: 0, P7: 0, L8: 0, P8: 0, L9: 0, P9: 0 },
              rombel: type === "sd_sekolah" ? [0, 0, 0, 0, 0, 0] : [0, 0, 0],
              guru: { pns: 0, nonAsn: 0, yayasan: 0, tendik: 0, kepsek: 1 }
            });
          } else if (type === "pkks") {
            setFormData({ sekolah: "", indikator: "Aktif", observasi: "A", keterangan: "" });
          } else if (type === "refleksi") {
            setFormData({ namaSekolah: "", pertemuan: 1, tanggal: new Date().toISOString().split('T')[0], deskripsi: "", status: "Aktif" });
          }
        }
        setIsModalOpen(true);
      };

      // Menyimpan data hasil inputan form (Tambah / Edit)
      const handleSaveData = (e) => {
        e.preventDefault();
        
        if (modalType === "sd_sekolah") {
          if (editData) {
            setSdSchools(sdSchools.map(s => s.id === editData.id ? formData : s));
            showNotification("Data SD Berhasil Diperbarui!");
          } else {
            const newId = "sd-" + Date.now();
            const newSchool = { ...formData, id: newId };
            setSdSchools([...sdSchools, newSchool]);
            // Otomatis masukkan ke daftar kunjungan
            setVisits([...visits, { id: "v-" + Date.now(), namaSekolah: formData.nama, jenjang: "SD", status: formData.status, checklist: Array(12).fill(false) }]);
            showNotification("Data SD Baru Berhasil Ditambahkan!");
          }
        } else if (modalType === "smp_sekolah") {
          if (editData) {
            setSmpSchools(smpSchools.map(s => s.id === editData.id ? formData : s));
            showNotification("Data SMP Berhasil Diperbarui!");
          } else {
            const newId = "smp-" + Date.now();
            const newSchool = { ...formData, id: newId };
            setSmpSchools([...smpSchools, newSchool]);
            // Otomatis masukkan ke daftar kunjungan
            setVisits([...visits, { id: "v-" + Date.now(), namaSekolah: formData.nama, jenjang: "SMP", status: formData.status, checklist: Array(12).fill(false) }]);
            showNotification("Data SMP Baru Berhasil Ditambahkan!");
          }
        } else if (modalType === "pkks") {
          if (editData) {
            setPkks(pkks.map(p => p.id === editData.id ? formData : p));
            showNotification("Data PKKS Berhasil Diperbarui!");
          } else {
            const newPkks = { ...formData, id: "p-" + Date.now() };
            setPkks([...pkks, newPkks]);
            showNotification("Data PKKS Baru Berhasil Ditambahkan!");
          }
        } else if (modalType === "refleksi") {
          if (editData) {
            setReflections(reflections.map(r => r.id === editData.id ? formData : r));
            showNotification("Data Refleksi Berhasil Diperbarui!");
          } else {
            const newRefl = { ...formData, id: "r-" + Date.now() };
            setReflections([...reflections, newRefl]);
            showNotification("Data Refleksi Baru Berhasil Ditambahkan!");
          }
        }
        setIsModalOpen(false);
      };

      // Menghapus baris data
      const handleDeleteData = (type, id) => {
        // Konfirmasi kustom sederhana dengan pembungkus UI aman
        const isConfirmed = window.confirm("Apakah Anda yakin ingin menghapus data ini?");
        if (isConfirmed) {
          if (type === "sd") {
            setSdSchools(sdSchools.filter(s => s.id !== id));
            showNotification("Data SD Berhasil Dihapus!", "error");
          } else if (type === "smp") {
            setSmpSchools(smpSchools.filter(s => s.id !== id));
            showNotification("Data SMP Berhasil Dihapus!", "error");
          } else if (type === "pkks") {
            setPkks(pkks.filter(p => p.id !== id));
            showNotification("Data PKKS Berhasil Dihapus!", "error");
          } else if (type === "refleksi") {
            setReflections(reflections.filter(r => r.id !== id));
            showNotification("Data Refleksi Berhasil Dihapus!", "error");
          } else if (type === "visit") {
            setVisits(visits.filter(v => v.id !== id));
            showNotification("Data Kunjungan Berhasil Dihapus!", "error");
          }
        }
      };

      // Update checklist kunjungan bulanan
      const handleToggleChecklist = (visitId, monthIndex) => {
        setVisits(visits.map(v => {
          if (v.id === visitId) {
            const updated = [...v.checklist];
            updated[monthIndex] = !updated[monthIndex];
            return { ...v, checklist: updated };
          }
          return v;
        }));
      };

      const totalSdCount = sdSchools.length;
      const totalSmpCount = smpSchools.length;
      const totalVisitsCount = visits.length;
      const totalPkksCount = pkks.length;
      const totalReflectionsCount = reflections.length;

      const monthNames = ["Jan", "Feb", "Mar", "Apr", "Mei", "Jun", "Jul", "Agu", "Sep", "Okt", "Nov", "Des"];

      // Semua daftar nama sekolah digabung untuk mempermudah filter dropdown
      const allSchoolNames = [
        ...sdSchools.map(s => ({ nama: s.nama, tipe: "SD" })),
        ...smpSchools.map(s => ({ nama: s.nama, tipe: "SMP" }))
      ];

      return (
        <div className="flex flex-col md:flex-row min-h-screen">
          
          {/* BANNER NOTIFIKASI */}
          {notification && (
            <div className={`fixed top-4 right-4 z-50 flex items-center space-x-3 px-5 py-3 rounded-lg shadow-xl text-white font-semibold transition-all duration-300 transform translate-y-0 ${notification.type === "error" ? "bg-red-600" : "bg-emerald-600"}`}>
              <i className={`fa-solid ${notification.type === "error" ? "fa-circle-exclamation" : "fa-circle-check"}`}></i>
              <span>{notification.message}</span>
            </div>
          )}

          {}
          {/* SIDEBAR SIPS - Sesuai dengan mockup di tangkapan layar */}
          <aside className="w-full md:w-64 bg-emerald-800 text-white flex flex-col no-print shrink-0 border-r border-emerald-900 shadow-md">
            <div className="p-6 border-b border-emerald-700/60 flex flex-col items-center">
              {/* Desain Avatar Guru/Admin */}

                <i className="fa-solid fa-user-tie"></i>
              </div>
              <h2 className="font-bold text-lg text-center leading-tight">Admin SIPS</h2>
              <span className="text-xs text-emerald-200 mt-1">adminsips@gmail.com</span>
              <div className="bg-emerald-950/80 text-amber-300 text-xs px-3 py-1 rounded-full font-semibold mt-3 flex items-center space-x-1 border border-emerald-700">
                <i className="fa-solid fa-shield-halved text-[10px]"></i>
                <span>SD & SMP Wilayah</span>
              </div>
            </div>

            {/* Menu Navigasi Sidebar */}
            <nav className="flex-1 px-4 py-6 space-y-1">
              <button 
                onClick={() => { setCurrentTab("dashboard"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "dashboard" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-solid fa-chart-line w-5 text-center text-base"></i>
                <span>Dashboard</span>
              </button>

              <button 
                onClick={() => { setCurrentTab("kunjungan"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "kunjungan" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-solid fa-calendar-check w-5 text-center text-base"></i>
                <span>Kunjungan Sekolah</span>
              </button>

              <button 
                onClick={() => { setCurrentTab("sd"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "sd" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-solid fa-school w-5 text-center text-base"></i>
                <span>Data SD</span>
              </button>

              <button 
                onClick={() => { setCurrentTab("smp"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "smp" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-solid fa-building-columns w-5 text-center text-base"></i>
                <span>Data SMP</span>
              </button>

              <button 
                onClick={() => { setCurrentTab("pkks"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "pkks" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-solid fa-id-card-clip w-5 text-center text-base"></i>
                <span>PKKS</span>
              </button>

              <button 
                onClick={() => { setCurrentTab("refleksi"); handleResetSearch(); }} 
                className={`w-full flex items-center space-x-3 px-4 py-3 rounded-lg text-sm font-semibold transition-all ${currentTab === "refleksi" ? "bg-emerald-900 text-white shadow-md font-bold border-l-4 border-amber-400" : "text-emerald-100 hover:bg-emerald-750 hover:text-white"}`}
              >
                <i className="fa-regular fa-comments w-5 text-center text-base"></i>
                <span>Refleksi</span>
              </button>
            </nav>

            <div className="p-6 border-t border-emerald-700/40 text-center text-xs text-emerald-200">
              <p className="font-semibold">SIPS v2.0</p>
              <p className="mt-1 opacity-80">Dinas Pendidikan</p>
              <p className="mt-1 font-mono text-[10px] opacity-60">Hak Cipta © 2026</p>
            </div>
          </aside>

          {}
          {/* WORKSPACE AREA */}
          <main className="flex-1 flex flex-col min-w-0">
            
            {/* Header Workspace */}
            <header className="bg-white border-b border-slate-200 shadow-sm py-4 px-6 md:px-8 flex flex-col sm:flex-row justify-between items-center no-print gap-4">
              <div className="flex items-center space-x-3">
                <i className="fa-solid fa-graduation-cap text-emerald-700 text-2xl"></i>
                <h1 className="text-xl font-bold text-slate-800 tracking-tight">Sistem Informasi Pengawas Sekolah (SIPS)</h1>
              </div>
              <div className="flex items-center space-x-3">
                <button 
                  onClick={() => window.print()} 
                  className="bg-emerald-600 hover:bg-emerald-700 text-white font-semibold px-4 py-2 rounded-lg text-sm transition flex items-center space-x-2 shadow-sm"
                >
                  <i className="fa-solid fa-print"></i>
                  <span>Cetak Laporan</span>
                </button>
              </div>
            </header>

            {/* Area Isi Konten Utama */}
            <div className="flex-1 p-6 md:p-8 print-area">
              
              {/* ==================================== */}
              {/* 1. KONTEN TAB: DASHBOARD */}
              {/* ==================================== */}
              {currentTab === "dashboard" && (
                <div>
                  <div className="mb-6">
                    <h2 className="text-2xl font-bold text-slate-800">Selamat Datang Di DashBoard SIPS</h2>
                    <p className="text-slate-500 text-sm mt-1">Halaman monitoring kesiswaan, profil, dan rekapitulasi penilaian kinerja SD & SMP.</p>
                  </div>

                  {/* Statistik Cards sesuai mockup warna di tangkapan layar laptop */}
                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-5 gap-6 mb-8">
                    <div className="bg-blue-600 text-white p-6 rounded-xl shadow relative overflow-hidden">
                      <div className="text-xs uppercase font-bold tracking-wider opacity-80">Total SD</div>
                      <div className="text-4xl font-extrabold mt-2">{totalSdCount}</div>
                      <div className="text-[11px] mt-4 bg-white/20 inline-block px-2 py-0.5 rounded font-medium">Sekolah Dasar</div>
                      <i className="fa-solid fa-school absolute right-3 bottom-3 text-white/10 text-6xl"></i>
                    </div>

                    <div className="bg-cyan-500 text-white p-6 rounded-xl shadow relative overflow-hidden">
                      <div className="text-xs uppercase font-bold tracking-wider opacity-80">Total SMP</div>
                      <div className="text-4xl font-extrabold mt-2">{totalSmpCount}</div>
                      <div className="text-[11px] mt-4 bg-white/20 inline-block px-2 py-0.5 rounded font-medium">Sekolah Menengah</div>
                      <i className="fa-solid fa-building-columns absolute right-3 bottom-3 text-white/10 text-6xl"></i>
                    </div>

                    <div className="bg-red-500 text-white p-6 rounded-xl shadow relative overflow-hidden">
                      <div className="text-xs uppercase font-bold tracking-wider opacity-80">Pengaduan</div>
                      <div className="text-4xl font-extrabold mt-2">0</div>
                      <div className="text-[11px] mt-4 bg-white/20 inline-block px-2 py-0.5 rounded font-medium">Laporan Masuk</div>
                      <i className="fa-solid fa-triangle-exclamation absolute right-3 bottom-3 text-white/10 text-6xl"></i>
                    </div>

                    <div className="bg-emerald-600 text-white p-6 rounded-xl shadow relative overflow-hidden">

                                <React.Fragment key={kls}>
                                  <div>
                                    <label className="block text-[11px] font-semibold text-slate-600 mb-1">Kls {kls} (Laki-laki)</label>
                                    <input 
                                      type="number" min="0"
                                      className="w-full border border-slate-300 rounded-lg px-2.5 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                      value={formData.murid?.[`L${kls}`] || 0}
                                      onChange={(e) => {
                                        const val = parseInt(e.target.value) || 0;
                                        setFormData({ ...formData, murid: { ...formData.murid, [`L${kls}`]: val } });
                                      }}
                                    />
                                  </div>
                                  <div>
                                    <label className="block text-[11px] font-semibold text-slate-600 mb-1">Kls {kls} (Perempuan)</label>
                                    <input 
                                      type="number" min="0"
                                      className="w-full border border-slate-300 rounded-lg px-2.5 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                      value={formData.murid?.[`P${kls}`] || 0}
                                      onChange={(e) => {
                                        const val = parseInt(e.target.value) || 0;
                                        setFormData({ ...formData, murid: { ...formData.murid, [`P${kls}`]: val } });
                                      }}
                                    />
                                  </div>
                                </React.Fragment>
                              ))}
                            </React.Fragment>
                          )}
                        </div>
                      </div>

                      {/* --- FORM SUB-KOMPONEN: DATA ROMBEL --- */}
                      <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <h4 className="font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4 text-xs uppercase tracking-wider text-cyan-700">Rombongan Belajar (Rombel)</h4>
                        <div className="grid grid-cols-3 sm:grid-cols-6 gap-4">
                          {modalType === "sd_sekolah" ? (
                            ["I", "II", "III", "IV", "V", "VI"].map((kls, idx) => (
                              <div key={idx}>
                                <label className="block text-xs font-semibold text-slate-600 mb-1">Kls {kls}</label>
                                <input 
                                  type="number" min="0"
                                  className="w-full border border-slate-300 rounded-lg px-2.5 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                  value={formData.rombel?.[idx] || 0}
                                  onChange={(e) => {
                                    const val = parseInt(e.target.value) || 0;
                                    const updatedRombel = [...(formData.rombel || [0,0,0,0,0,0])];
                                    updatedRombel[idx] = val;
                                    setFormData({ ...formData, rombel: updatedRombel });
                                  }}
                                />
                              </div>
                            ))
                          ) : (
                            ["VII", "VIII", "IX"].map((kls, idx) => (
                              <div key={idx}>
                                <label className="block text-xs font-semibold text-slate-600 mb-1">Kls {kls}</label>
                                <input 
                                  type="number" min="0"
                                  className="w-full border border-slate-300 rounded-lg px-2.5 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                                  value={formData.rombel?.[idx] || 0}
                                  onChange={(e) => {
                                    const val = parseInt(e.target.value) || 0;
                                    const updatedRombel = [...(formData.rombel || [0,0,0])];
                                    updatedRombel[idx] = val;
                                    setFormData({ ...formData, rombel: updatedRombel });
                                  }}
                                />
                              </div>
                            ))
                          )}
                        </div>
                      </div>

                      {/* --- FORM SUB-KOMPONEN: DATA KEPEGAWAIAN GURU --- */}
                      <div className="bg-slate-50 p-4 rounded-lg border border-slate-200">
                        <h4 className="font-bold text-slate-800 border-b border-slate-200 pb-2 mb-4 text-xs uppercase tracking-wider text-amber-700">Profil Status Guru & Tenaga Kependidikan</h4>
                        <div className="grid grid-cols-2 md:grid-cols-5 gap-4">
                          <div>
                            <label className="block text-xs font-semibold text-slate-600 mb-1">PNS / P3K</label>
                            <input 
                              type="number" min="0"
                              className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                              value={formData.guru?.pns || 0}
                              onChange={(e) => {
                                const val = parseInt(e.target.value) || 0;
                                setFormData({ ...formData, guru: { ...formData.guru, pns: val } });
                              }}
                            />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-600 mb-1">Non-ASN</label>
                            <input 
                              type="number" min="0"
                              className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                              value={formData.guru?.nonAsn || 0}
                              onChange={(e) => {
                                const val = parseInt(e.target.value) || 0;
                                setFormData({ ...formData, guru: { ...formData.guru, nonAsn: val } });
                              }}
                            />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-600 mb-1">Yayasan</label>
                            <input 
                              type="number" min="0"
                              className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                              value={formData.guru?.yayasan || 0}
                              onChange={(e) => {
                                const val = parseInt(e.target.value) || 0;
                                setFormData({ ...formData, guru: { ...formData.guru, yayasan: val } });
                              }}
                            />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-600 mb-1">Tendik (Staf/TU)</label>
                            <input 
                              type="number" min="0"
                              className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                              value={formData.guru?.tendik || 0}
                              onChange={(e) => {
                                const val = parseInt(e.target.value) || 0;
                                setFormData({ ...formData, guru: { ...formData.guru, tendik: val } });
                              }}
                            />
                          </div>
                          <div>
                            <label className="block text-xs font-semibold text-slate-600 mb-1">Kepala Sekolah</label>
                            <input 
                              type="number" min="0" max="1"
                              className="w-full border border-slate-300 rounded-lg px-3 py-1.5 text-center focus:ring-2 focus:ring-emerald-500 focus:outline-none bg-slate-100 font-bold"
                              value={formData.guru?.kepsek || 1}
                              disabled
                            />
                          </div>
                        </div>
                      </div>
                    </div>
                  )}

                  {/* --- B. FORM UNTUK PKKS --- */}
                  {modalType === "pkks" && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Pilih Sekolah Binaan *</label>
                        <select required
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          value={formData.sekolah || ""}
                          onChange={(e) => setFormData({ ...formData, sekolah: e.target.value })}
                        >
                          <option value="">-- Silakan Pilih Sekolah --</option>
                          {allSchoolNames.map((s, idx) => (
                            <option key={idx} value={s.nama}>{`[${s.tipe}] ${s.nama}`}</option>
                          ))}
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Indikator Kinerja</label>
                        <select 
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          value={formData.indikator || "Aktif"}
                          onChange={(e) => setFormData({ ...formData, indikator: e.target.value })}
                        >
                          <option value="Aktif">Aktif</option>
                          <option value="Sangat Aktif">Sangat Aktif</option>
                          <option value="Dalam Pembinaan">Dalam Pembinaan</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Hasil Nilai Observasi Akhir (Huruf)</label>
                        <select 
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 font-bold text-amber-600 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          value={formData.observasi || "A"}
                          onChange={(e) => setFormData({ ...formData, observasi: e.target.value })}
                        >
                          <option value="A">A (Sangat Baik)</option>
                          <option value="B">B (Baik)</option>
                          <option value="C">C (Cukup)</option>
                          <option value="D">D (Kurang)</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Keterangan Evaluasi / Catatan Rekomendasi</label>
                        <textarea 
                          rows="4"
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          placeholder="Tulis uraian catatan pengawasan di sini..."
                          value={formData.keterangan || ""}
                          onChange={(e) => setFormData({ ...formData, keterangan: e.target.value })}
                        ></textarea>
                      </div>
                    </div>
                  )}

                  {/* --- C. FORM UNTUK REFLEKSI --- */}
                  {modalType === "refleksi" && (
                    <div className="space-y-4">
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Pilih Sekolah Binaan *</label>
                        <select required
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          value={formData.namaSekolah || ""}
                          onChange={(e) => setFormData({ ...formData, namaSekolah: e.target.value })}
                        >
                          <option value="">-- Silakan Pilih Sekolah --</option>
                          {allSchoolNames.map((s, idx) => (
                            <option key={idx} value={s.nama}>{`[${s.tipe}] ${s.nama}`}</option>
                          ))}
                        </select>
                      </div>
                      <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-xs font-bold text-slate-700 mb-1">Pertemuan Ke (Angka) *</label>
                          <input 
                            type="number" required min="1"
                            className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                            value={formData.pertemuan || 1}
                            onChange={(e) => setFormData({ ...formData, pertemuan: parseInt(e.target.value) || 1 })}
                          />
                        </div>
                        <div>
                          <label className="block text-xs font-bold text-slate-700 mb-1">Tanggal Pertemuan *</label>
                          <input 
                            type="date" required
                            className="w-full border border-slate-300 rounded-lg px-3 py-2 font-mono focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                            value={formData.tanggal || ""}
                            onChange={(e) => setFormData({ ...formData, tanggal: e.target.value })}
                          />
                        </div>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Status Refleksi</label>
                        <select 
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          value={formData.status || "Aktif"}
                          onChange={(e) => setFormData({ ...formData, status: e.target.value })}
                        >
                          <option value="Aktif">Aktif</option>
                          <option value="Selesai">Selesai</option>
                          <option value="Tertunda">Tertunda</option>
                        </select>
                      </div>
                      <div>
                        <label className="block text-xs font-bold text-slate-700 mb-1">Uraian / Deskripsi Hasil Pertemuan</label>
                        <textarea 
                          rows="4"
                          className="w-full border border-slate-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-emerald-500 focus:outline-none"
                          placeholder="Tulis ringkasan hasil diskusi refleksi di sini..."
                          value={formData.deskripsi || ""}
                          onChange={(e) => setFormData({ ...formData, deskripsi: e.target.value })}
                        ></textarea>
                      </div>
                    </div>
                  )}

                  {/* Tombol Aksi di Footer Modal */}
                  <div className="bg-slate-50 -mx-6 -mb-6 p-4 mt-8 border-t border-slate-200 flex justify-end space-x-3">
                    <button 
                      type="button" 
                      onClick={() => setIsModalOpen(false)}
                      className="bg-white border border-slate-300 hover:bg-slate-100 text-slate-700 font-semibold px-4 py-2 rounded-lg text-xs transition-all shadow-sm"
                    >
                      Batal
                    </button>
                    <button 
                      type="submit"
                      className="bg-emerald-700 hover:bg-emerald-800 text-white font-semibold px-5 py-2 rounded-lg text-xs transition-all shadow-md flex items-center space-x-1.5"
                    >
                      <i className="fa-solid fa-cloud-arrow-up"></i>
                      <span>Simpan Perubahan</span>
                    </button>
                  </div>

                </form>

              </div>
            </div>
          )}

        </div>
      );
    }

    // Render Aplikasi React ke dalam DOM
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
